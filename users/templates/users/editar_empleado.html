<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Editar Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow" style="max-width: 500px; margin: auto;">
            <div class="card-header bg-warning text-dark"><h4>Editar Cajero</h4></div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3"><label>Nombre de Usuario:</label><input type="text" name="username" class="form-control" value="{{ empleado.username }}" required></div>
                    <div class="mb-3"><label>Nueva Contraseña (Dejar en blanco para no cambiarla):</label><input type="password" name="password" class="form-control"></div>
                    <button type="submit" class="btn btn-warning w-100">Actualizar Cambios</button>
                    <a href="{% url 'panel_admin' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
