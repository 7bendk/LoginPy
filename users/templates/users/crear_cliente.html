<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Crear Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow" style="max-width: 500px; margin: auto;">
            <div class="card-header bg-secondary text-white"><h4>Registrar Nuevo Cliente</h4></div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3"><label>Nombre Completo:</label><input type="text" name="nombre" class="form-control" required></div>
                    <div class="mb-3"><label>Teléfono:</label><input type="text" name="telefono" class="form-control"></div>
                    <div class="mb-3"><label>Email:</label><input type="email" name="email" class="form-control"></div>
                    <button type="submit" class="btn btn-success w-100">Guardar Cliente</button>
                    <a href="{% url 'panel_admin' %}" class="btn btn-danger w-100 mt-2">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
