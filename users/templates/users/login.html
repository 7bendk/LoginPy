<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device=width, initial-scale=1.0">
    <title>Sports POS - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* 1. Fondo con gradiente animado (Colores vibrantes) */
        body {
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #00c6ff, #0072ff);
            background-size: 400% 400%;
            animation: moverFondo 15s ease infinite;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes moverFondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Tarjeta con efecto de cristal y animación de entrada */
        .tarjeta-login {
            background: rgba(255, 255, 255, 0.90); /* Blanco casi sólido pero transparente */
            backdrop-filter: blur(10px); /* Desenfoque detrás de la tarjeta */
            animation: entradaSuave 0.8s ease-out forwards; /* Ejecuta la animación al cargar */
            opacity: 0; /* Empieza invisible */
            transform: translateY(40px); /* Empieza un poco abajo */
        }

        @keyframes entradaSuave {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 3. Botón flotante al hacer hover */
        .btn-entrar {
            transition: all 0.3s ease; /* Transición suave */
            background-color: #0dcaf0; /* Color cyan deportivo */
            border: none;
            color: #000;
        }
        
        .btn-entrar:hover {
            transform: translateY(-4px); /* Sube 4 pixeles */
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); /* Crea sombra abajo */
            background-color: #00c6ff;
            color: #fff;
        }

        /* 4. Estilizar los inputs al hacer clic (Focus) */
        .form-control:focus {
            border-color: #0dcaf0;
            box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25);
        }
    </style>
</head>
<body>
    
    <div class="vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow-lg p-5 col-11 col-md-4 border-0 rounded-4 tarjeta-login">
            <div class="text-center mb-4">
                <div class="display-1 mb-2">Now</div> <h1 class="text-dark fw-bold">Sports POS</h1>
                <p class="text-secondary">Acceso seguro al sistema</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                {% if form.errors %}
                    <div class="alert alert-danger p-2 text-center" style="animation: entradaSuave 0.4s ease-out forwards;">
                        Usuario o contraseña incorrectos.
                    </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label fw-bold text-dark">Usuario</label>
                    <input type="text" name="username" class="form-control form-control-lg bg-light" placeholder="Ej. empleado1" required>
                </div>
                
                <div class="mb-5">
                    <label class="form-label fw-bold text-dark">Contraseña</label>
                    <input type="password" name="password" class="form-control form-control-lg bg-light" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-lg w-100 fw-bold btn-entrar">
                    ENTRAR
                </button>
            </form>
        </div>
    </div>

</body>
</html>
