<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Crear Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow" style="max-width: 500px; margin: auto;">
            <div class="card-header bg-info text-dark"><h4>Registrar Cajero</h4></div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3"><label>Nombre de Usuario:</label><input type="text" name="username" class="form-control" required></div>
                    <div class="mb-3"><label>Contraseña Temporal:</label><input type="password" name="password" class="form-control" required></div>
                    <div class="alert alert-warning small">Al guardar, este usuario tendrá el rol automático de "Empleado".</div>
                    <button type="submit" class="btn btn-success w-100">Guardar Cajero</button>
                    <a href="{% url 'panel_admin' %}" class="btn btn-danger w-100 mt-2">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
