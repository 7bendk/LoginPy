<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Editar Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow" style="max-width: 500px; margin: auto;">
            <div class="card-header bg-warning text-dark"><h4>Editar Cliente</h4></div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3"><label>Nombre Completo:</label><input type="text" name="nombre" class="form-control" value="{{ cliente.nombre }}" required></div>
                    <div class="mb-3"><label>Teléfono:</label><input type="text" name="telefono" class="form-control" value="{{ cliente.telefono }}"></div>
                    <div class="mb-3"><label>Email:</label><input type="email" name="email" class="form-control" value="{{ cliente.email }}"></div>
                    <button type="submit" class="btn btn-warning w-100">Actualizar Cambios</button>
                    <a href="{% url 'panel_admin' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
